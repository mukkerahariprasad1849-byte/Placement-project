<!DOCTYPE html>
<html>
<body>

<h2>Edit Certificate</h2>

<form action="/addCertificate" method="post">
    <input type="hidden" name="id" th:value="${certificate.id}">

    Course: <input type="text" name="course" th:value="${certificate.course}"><br>
    Organization: <input type="text" name="organization" th:value="${certificate.organization}"><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
