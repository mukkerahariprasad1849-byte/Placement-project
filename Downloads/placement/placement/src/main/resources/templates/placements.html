<!DOCTYPE html>
<a href="/students">Students</a> |
<a href="/placements">Placements</a>
<hr>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Placements</title>
</head>
<body>

<h2>Add Placement</h2>

<form action="/addPlacement" method="post">
    Company: <input type="text" name="company"><br>
    Role: <input type="text" name="role"><br>
    <button type="submit">Save</button>
</form>

<h2>Placement List</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Company</th>
    <th>Role</th>
    <th>Action</th>
</tr>

<tr th:each="p : ${placements}">
    <td th:text="${p.id}"></td>
    <td th:text="${p.company}"></td>
    <td th:text="${p.role}"></td>
    <td>
        <a th:href="@{/deletePlacement/{id}(id=${p.id})}">Delete</a>
    </td>
</tr>

</table>

</body>
</html>
